<style>
:root{--bg:#f6f7f9;--card:#fff;--line:#e8ebf0;--line2:#f1f3f5;--ink:#0f172a;--body:#475569;--muted:#94a3b8;--brand:#3f5e7a;--ok:#15803d;--bad:#b91c1c;--sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05)}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:light}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--body);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.1px;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
#load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f6f7f9;color:#64748b;font-size:14px;z-index:50}
#app{display:none}
/* 상단 헤더(일보 스타일) */
.hdr{position:sticky;top:0;z-index:40;background:#0f172a;color:#fff}
.hdr-in{max-width:1560px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.brand .lg{width:37px;height:37px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 5px 14px rgba(37,99,235,.35)}
.brand b{color:#fff;font-size:14.5px;font-weight:800;display:block;line-height:1.1}.brand small{display:block;color:#64748b;font-size:10.5px;margin-top:1px}
.hdr-c{display:flex;gap:8px;flex-wrap:wrap;margin:0 auto}
.hdr-r{display:flex;align-items:center;gap:9px;margin-left:auto}
.hdr .seg{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);border-radius:9px;overflow:hidden;display:inline-flex}
.hdr .seg button{border:0;background:transparent;padding:7px 12px;font-size:12.5px;font-weight:600;color:#94a3b8;cursor:pointer}
.hdr .seg button.on{background:#2563eb;color:#fff}
.hbtn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:8px 12px;color:#e2e8f0;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.hbtn:hover{background:rgba(255,255,255,.16)}
.acctbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:4px 11px 4px 4px;display:flex;align-items:center;gap:8px;color:#fff}
.acctbtn:hover{background:rgba(255,255,255,.12)}
.acctbtn .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ff5722,#ff8a50);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.acctbtn .who{text-align:left;line-height:1.2}.acctbtn .nm{font-size:12px;font-weight:700;color:#f1f5f9;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.acctbtn .em{font-size:10px;color:#94a3b8;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sw-wrap{position:relative}
.dd{display:none;position:absolute;top:122%;right:0;background:#1e293b;border:1px solid #334155;border-radius:12px;box-shadow:0 16px 42px rgba(0,0,0,.5);z-index:50;padding:6px;min-width:220px}
.dd.open{display:block}
.dd>button{width:100%;text-align:left;background:transparent;border:0;border-radius:8px;padding:9px 11px;font-size:13px;color:#cbd5e1;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer}
.dd>button:hover{background:rgba(255,255,255,.08);color:#fff}
.sw-item{border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:9px;color:#94a3b8;font-size:12.5px;cursor:pointer;font-weight:600}
.sw-item:hover{background:rgba(255,255,255,.1);color:#fff}.sw-item.cur{background:rgba(63,94,122,.4);color:#fff}
.sw-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:19px;color:#fff;border-radius:6px;font-size:10px;font-weight:700;padding:0 5px;flex-shrink:0}
.nav{max-width:1560px;margin:0 auto;padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.08)}
.nav::-webkit-scrollbar{display:none}
.nav a{display:flex;align-items:center;gap:7px;padding:11px 14px 12px;font-size:13.5px;font-weight:600;color:#94a3b8;border-bottom:2.5px solid transparent;white-space:nowrap;cursor:pointer;text-decoration:none}
.nav a .ico{font-size:15px}
.nav a:hover{color:#fff}
.nav a.active{color:#fff;border-bottom-color:#3b82f6}
/* 메인 */
#main{max-width:1560px;margin:0 auto;min-height:60vh}
.pagetitle{padding:22px 24px 2px}
.pagetitle h2{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.pagetitle .desc{color:var(--muted);font-size:12.5px;margin-top:4px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff;box-shadow:var(--sh)}
.seg button{border:0;background:#fff;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:#0f172a;color:#fff}
.wrap{padding:22px 30px 50px}
.sec{font-size:15px;font-weight:700;color:var(--ink);margin:6px 0 14px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--sh)}
.kpi .l{font-size:11.5px;color:var(--muted);font-weight:500}
.kpi .v{font-size:22px;font-weight:800;color:var(--ink);margin-top:6px;line-height:1}
.kpi .s{font-size:11px;margin-top:6px;font-weight:600}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--sh);margin-bottom:18px}
.up{color:var(--ok)}.dn{color:var(--bad)}.mut{color:var(--muted)}
/* 보고형식 상세표 */
.tbl-scroll{overflow-x:auto}
table.rt{width:100%;border-collapse:collapse;font-size:12px;min-width:920px}
.rt th,.rt td{border:1px solid var(--line);padding:5px 8px;text-align:right;white-space:nowrap}
.rt thead th{background:#eef2f6;color:#475569;font-weight:700;font-size:11px;text-align:center}
.rt thead th.grp{background:#e3e9f0;color:#0f172a}
.rt td.lbl{text-align:left;position:sticky;left:0;background:#fff;z-index:1}
.rt th.lbl{text-align:left;position:sticky;left:0;background:#eef2f6;z-index:2}
.rt .cv{font-weight:600;color:var(--ink)}
.rt .cp{font-size:10px;color:var(--muted);margin-top:1px}
.rt tr.grand td{background:#0f172a;color:#fff;font-weight:800}
.rt tr.grand td.lbl{background:#0f172a;color:#fff}
.rt tr.grand .cv{color:#fff}.rt tr.grand .cp{color:#cbd5e1}
.rt tr.cat td{background:#eef2f6;font-weight:800;cursor:pointer}
.rt tr.cat td.lbl{background:#eef2f6}
.rt tr.sub td{background:#f6f8fb;font-weight:700;cursor:pointer}
.rt tr.sub td.lbl{background:#f6f8fb;padding-left:18px}
.rt tr.prod{cursor:pointer}
.rt tr.prod td.lbl{padding-left:26px}
.rt tr.prod:hover td{background:#f0f6ff}
.rt tr.prod:hover td.lbl{background:#f0f6ff}
.rt .catdot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}
.hint{font-size:11.5px;color:var(--muted);font-weight:500}
.note{font-size:13px;color:var(--body);padding:7px 0;border-bottom:1px dashed var(--line);line-height:1.5}
.note.h{font-weight:700;color:var(--ink);border:0;padding-top:14px}
.note.b{padding-left:14px;position:relative}.note.b:before{content:'·';position:absolute;left:2px;color:var(--brand)}
.mv{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.mv .nm{flex:1;font-weight:600;color:var(--ink);font-size:13px}
.mv .delta{font-weight:700;font-size:13px}
/* 드릴다운 모달 */
.modal{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:70;padding:24px}
.modal.open{display:flex}
.mbox{background:#fff;border-radius:18px;width:min(720px,100%);max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.mhd{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
.mhd h3{font-size:17px;color:var(--ink);font-weight:800}
.mhd .x{border:0;background:#f1f3f5;width:30px;height:30px;border-radius:8px;color:#64748b;font-size:16px}
.mbody{padding:18px 22px 24px}
.mkpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.mkpi{background:#f8fafc;border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.mkpi .l{font-size:11px;color:var(--muted)}.mkpi .v{font-size:17px;font-weight:800;color:var(--ink);margin-top:4px}.mkpi .s{font-size:11px;margin-top:3px;font-weight:600}
.dt{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.dt th,.dt td{border-bottom:1px solid var(--line2);padding:7px 9px;text-align:right}
.dt th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase}
.dt td.l,.dt th.l{text-align:left;font-weight:600;color:var(--ink)}
/* 로그인(폴백) */
#login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e2140);z-index:60}
.lc{background:#fff;border-radius:18px;padding:40px 34px;width:350px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.lc h1{font-size:18px;text-align:center;color:#0f172a}.lc .sub{text-align:center;color:#94a3b8;font-size:13px;margin:4px 0 22px}
.lc input{width:100%;padding:12px 14px;border:1px solid #e8ebf0;border-radius:10px;margin-bottom:11px}
.lc button{width:100%;padding:12px;border:0;border-radius:10px;background:#3f5e7a;color:#fff;font-weight:700}
#login-err{color:#b91c1c;font-size:12.5px;text-align:center;margin-top:10px;display:none}
@media(max-width:820px){
  .hdr-in{padding:10px 14px;gap:10px}
  .hdr-c{order:3;width:100%;margin:0;justify-content:flex-start}
  .brand small{display:none}
  .acctbtn .who{display:none}
  .nav{padding:0 8px}.nav a{padding:10px 11px;font-size:12.5px}
  .pagetitle{padding:16px 14px 2px}.wrap{padding:14px 14px 60px}
  body{overflow-x:hidden}
}
</style>

// ── 미반영(ilbo_pending) → 포트폴리오 품목 매핑·가산 (total.html과 동일 소스) ──
function pmapItem(p){
  p=String(p||'').trim();
  if(!p) return null;
  if(/oligio.*(face|eye).*tip|oligio.*tip|^tip/i.test(p)) return 'Oligio Tip';
  if(/cartridge|카트리지/i.test(p)) return 'Cartridge';
  if(/oligio\s*x|the oligio/i.test(p)) return 'Oligio X';
  if(/oligio\s*kiss/i.test(p)) return 'Oligio Kiss';
  if(/oligio/i.test(p)) return 'Oligio';
  if(/tightan|ultra\s*skin/i.test(p)) return 'Tightan';
  if(/lavieen|nouvaderm/i.test(p)) return 'Lavieen';
  if(/pastelle/i.test(p)) return 'Pastelle';
  if(/v[\s-]*laser/i.test(p)) return 'V-Laser';
  if(/majesty/i.test(p)) return 'Picocare Majesty';
  if(/pico\s*care|picocare|450/i.test(p)) return 'Picocare 450';
  if(/pico\s*andy/i.test(p)) return 'Pico Andy';
  if(/pico\s*alex/i.test(p)) return 'PicoAlex';
  if(/sandro/i.test(p)) return 'SANDRO Dual';
  if(/avvio/i.test(p)) return 'AVVIO';
  if(/asr|cosjet/i.test(p)) return 'Cosjet ASR';
  if(/holinwon/i.test(p)) return 'HolinWON';
  if(/veincare/i.test(p)) return 'Veincare';
  if(/beladon/i.test(p)) return 'Beladona';
  return null;
}
const CONSUM_ITEMS=['Oligio Tip','Cartridge'];
function buildPendAgg(rows){
  // {amount:{scope:{item:[q1..q4]}}, qty:{...}} — 2026 expectedDate 기준 분기
  const A={'전체':{},'국내':{},'해외':{}}, Q={'전체':{},'국내':{},'해외':{}};
  let cnt=0;
  (rows||[]).forEach(r=>{
    const st=String(r.status||''); if(st==='취소'||st==='반영됨'||st==='반영') return;
    const item=pmapItem(r.product); if(!item) return;
    const ed=String(r.expectedDate||''); const m=ed.match(/^2026-(\d{2})/); if(!m) return;
    const qi=Math.floor((parseInt(m[1],10)-1)/3); if(qi<0||qi>3) return;
    const scp=(r.region==='해외')?'해외':'국내';
    const amt=(Number(r.amount)||0)/1e6, qty=Number(r.qty)||0;
    const addA=(s)=>{ A[s][item]=A[s][item]||[0,0,0,0]; A[s][item][qi]+=amt; };
    addA('전체'); addA(scp);
    if(CONSUM_ITEMS.indexOf(item)<0){ const addQ=(s)=>{ Q[s][item]=Q[s][item]||[0,0,0,0]; Q[s][item][qi]+=qty; }; addQ('전체'); addQ(scp); }
    cnt++;
  });
  PENDAGG=cnt>0?{amount:A,qty:Q}:null;
}
const RFSET=['Oligio','Oligio X','Oligio Kiss'], HIFUSET=['Tightan'], AGG_ITEMS=['총합계','소계','RF 소계','HIFU 소계'];
function applyPending(base){
  if(!showPend||!PENDAGG) return base;
  const SP2=JSON.parse(JSON.stringify(base));
  ['amount','qty'].forEach(u=>{['전체','국내','해외'].forEach(s=>{
    const arr=SP2[u]&&SP2[u][s]; if(!arr) return;
    const pend=(PENDAGG[u]&&PENDAGG[u][s])||{};
    arr.forEach(r=>{ if(AGG_ITEMS.indexOf(r.item)>=0) return; const pv=pend[r.item]; if(!pv) return;
      r.q26=r.q26||[0,0,0,0]; for(let i=0;i<4;i++) r.q26[i]=(r.q26[i]||0)+(pv[i]||0); r.t26=r.q26[0]+r.q26[1]+r.q26[2]+r.q26[3]; });
    const prod=arr.filter(r=>AGG_ITEMS.indexOf(r.item)<0);
    const sum=rows=>{const q=[0,0,0,0];rows.forEach(r=>{for(let i=0;i<4;i++)q[i]+=(r.q26&&r.q26[i])||0;});return q;};
    arr.forEach(r=>{ let src=null;
      if(r.item==='총합계') src=prod;
      else if(r.item==='소계') src=prod.filter(p=>p.cat===r.cat);
      else if(r.item==='RF 소계') src=prod.filter(p=>RFSET.indexOf(p.item)>=0);
      else if(r.item==='HIFU 소계') src=prod.filter(p=>HIFUSET.indexOf(p.item)>=0);
      if(src){ r.q26=sum(src); r.t26=r.q26[0]+r.q26[1]+r.q26[2]+r.q26[3]; } });
  });});
  return SP2;
}
function setPend(on){ showPend=on; document.querySelectorAll('#seg-pend button').forEach(b=>b.classList.toggle('on',(b.dataset.v==='on')===on)); SP=applyPending(SPbase); render(); }

// ── 데이터 헬퍼 ──
function scopeRows(u,s){ return (SP&&SP[u]&&SP[u][s])||[]; }
function rows(){ return scopeRows(unit,scope); }
function findRow(u,s,cat,item){ return scopeRows(u,s).find(r=>r.cat===cat&&r.item===item); }
function grand(u,s){ return findRow(u,s,'총합계','총합계')||{q25:[0,0,0,0],q26:[0,0],t25:0,t26:0}; }
function cv(r,col){ return col.i==null ? (r[col.k]||0) : ((r[col.k]||[])[col.i]||0); }   // 컬럼값
function h1(r){ return (r.q25?(r.q25[0]||0)+(r.q25[1]||0):0); }   // 1H25
function curv(r){ return r.t26||0; }                              // 1H26
function fmt(v){ return Math.round(v).toLocaleString(); }         // 보고표(백만원/대)
function eok(v){ return (v/100).toFixed(1)+'억'; }                // 억 표기(금액 전용)
function pct(n,d){ return d>0?(n/d*100):0; }
function yoyChip(n,d){ if(!d) return '<span class="mut">–</span>'; const g=(n/d-1)*100; return '<span class="'+(g>=0?'up':'dn')+'">'+(g>=0?'+':'')+g.toFixed(0)+'%</span>'; }
function setUnit(u){unit=u;if(unit==='qty'&&scope!=='전체'){}document.querySelectorAll('#seg-unit button').forEach(b=>b.classList.toggle('on',b.dataset.v===u));render();}
function setScope(s){scope=s;document.querySelectorAll('#seg-scope button').forEach(b=>b.classList.toggle('on',b.dataset.v===s));render();}
function ddToggle(id){var el=document.getElementById(id);if(!el)return;var wasOpen=el.classList.contains('open');document.querySelectorAll('.dd.open').forEach(function(d){d.classList.remove('open');});if(!wasOpen)el.classList.add('open');}
document.addEventListener('click',function(e){if(!e.target.closest('.sw-wrap'))document.querySelectorAll('.dd.open').forEach(function(d){d.classList.remove('open');});});
function setNav(el){document.querySelectorAll('.nav a').forEach(function(a){a.classList.remove('active');});if(el)el.classList.add('active');}
const SECLBL={'s-kpi':'경영 요약','s-table':'상세 실적표','s-mix':'비중 추이','s-growth':'성장 분석','s-note':'주요 내역'};
function goSec(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function rowType(r){ if(r.item==='총합계')return'grand'; if(r.item==='소계')return'cat'; if(/소계$/.test(r.item))return'sub'; return'prod'; }

let charts=[];
function render(){
  charts.forEach(c=>{try{c.destroy()}catch(e){}}); charts=[];
  document.getElementById('view').innerHTML=secKpi()+secTable()+secMix()+secGrowth()+secNote();
  drawMix();

// ── 경영 요약 ──
function secKpi(){
  const gA=grand('amount','전체'), gAo=grand('amount','해외'), gQ=grand('qty','전체');
  const cur1H=gA.t26, prev1H=h1(gA), fy25=gA.t25, yoyA=prev1H>0?((cur1H/prev1H-1)*100):0;
  const qCur=gQ.t26, qPrev=h1(gQ), yoyQ=qPrev>0?((qCur/qPrev-1)*100):0;
  const ov=pct(gAo.t26,gA.t26);
  const k=[
    {l:'1H26 매출 (반기)',v:eok(cur1H),s:'<span class="'+(yoyA>=0?'up':'dn')+'">'+(yoyA>=0?'▲':'▼')+Math.abs(yoyA).toFixed(1)+'%</span> <span class="mut">vs 1H25 '+eok(prev1H)+'</span>'},
    {l:'1H26 월평균',v:eok(cur1H/6),s:'<span class="mut">반기 6개월 기준</span>'},
    {l:'1H26 수량',v:fmt(qCur)+'대',s:'<span class="'+(yoyQ>=0?'up':'dn')+'">'+(yoyQ>=0?'▲':'▼')+Math.abs(yoyQ).toFixed(1)+'%</span> <span class="mut">vs 1H25</span>'},
    {l:'해외 비중 (금액)',v:ov.toFixed(1)+'%',s:'<span class="mut">국내 '+(100-ov).toFixed(1)+'%</span>'},
    {l:'2025년 연 매출',v:eok(fy25),s:'<span class="mut">전년 실적(연간)</span>'},
  ];
  return '<div id="s-kpi"></div><div class="grid kpis">'+k.map(x=>'<div class="kpi"><div class="l">'+x.l+'</div><div class="v">'+x.v+'</div><div class="s">'+x.s+'</div></div>').join('')+'</div>';
}

// ── 상세 실적표 (엑셀 보고형식) ──
function secTable(){
  const g=grand(unit,scope);
  const unitLab=unit==='amount'?'백만원':'대';
  let body='';
  rows().forEach(r=>{
    const ty=rowType(r);
    const cat=r.cat, col=CATCOL[cat]||'#94a3b8';
    const lbl = ty==='grand'?'총합계' : ty==='cat'? ('<span class="catdot" style="background:'+col+'"></span>'+cat+' 소계') : r.item;
    const click = ty==='grand'?'' : ' onclick="openDetail(\''+cat.replace(/'/g,"\\'")+'\',\''+r.item.replace(/'/g,"\\'")+'\')"';
    let tds='';
    COLS.forEach(c=>{ const v=cv(r,c), p=pct(v,cv(g,c)); tds+='<td><div class="cv">'+fmt(v)+'</div><div class="cp">'+p.toFixed(1)+'%</div></td>'; });
    body+='<tr class="'+ty+'"'+click+'><td class="lbl">'+lbl+'</td>'+tds+'</tr>';
  });
  return '<div id="s-table"></div><div class="card" style="padding:16px 16px 8px">'+
    '<div class="sec" style="margin:2px 4px 12px">📋 분기별 Portfolio ('+(unit==='amount'?'금액':'수량')+') <span class="hint">단위 '+unitLab+' · 숫자/행 클릭 → 상세현황 · %는 분기 총합계 대비</span></div>'+
    '<div class="tbl-scroll"><table class="rt"><thead>'+
      '<tr><th class="lbl" rowspan="2">상세품목</th><th class="grp" colspan="5">2025년</th><th class="grp" colspan="3">2026년</th></tr>'+
      '<tr>'+COLS.map(c=>'<th>'+c.lab+'</th>').join('')+'</tr>'+
    '</thead><tbody>'+body+'</tbody></table></div></div>';
}

// ── 비중 추이 (선그래프 1개) ──
function secMix(){
  return '<div id="s-mix"></div><div class="card"><div class="sec">📉 카테고리 비중 추이 <span class="hint">분기별 구성비(%) · '+(unit==='amount'?'금액':'수량')+' · '+scope+'</span></div>'+
   '<div style="height:320px"><canvas id="mixc"></canvas></div></div>';
}
function drawMix(){
  const ctx=document.getElementById('mixc'); if(!ctx)return;
  const g=grand(unit,scope);
  const tot=COLS.filter(c=>c.i!=null).map(c=>cv(g,c)); // 6개 분기 총합계
  const cats=rows().filter(r=>r.item==='소계').map(r=>r.cat);
  const ds=cats.map(cat=>{
    const sr=findRow(unit,scope,cat,'소계')||{};
    const data=COLS.filter(c=>c.i!=null).map((c,i)=>tot[i]>0?+(cv(sr,c)/tot[i]*100).toFixed(1):0);
    return {label:cat,data,borderColor:CATCOL[cat]||'#94a3b8',backgroundColor:CATCOL[cat]||'#94a3b8',borderWidth:2.5,tension:.3,pointRadius:3,pointHoverRadius:5,fill:false};
  });
  charts.push(new Chart(ctx,{type:'line',data:{labels:QL,datasets:ds},options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11.5},color:'#475569',usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},
    scales:{x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}},y:{grid:{color:'#f1f3f5'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+'%'}}}}}));
}

// ── 성장 분석 ──
function secGrowth(){
  const list=[];
  rows().forEach(r=>{ if(rowType(r)==='prod'){ const d=curv(r)-h1(r); list.push({c:r.cat,item:r.item,d,cur:curv(r),prev:h1(r)}); } });
  const grow=list.filter(x=>x.d>0).sort((a,b)=>b.d-a.d).slice(0,7);
  const drop=list.filter(x=>x.d<0).sort((a,b)=>a.d-b.d).slice(0,4);
  const row=x=>'<div class="mv"><span style="width:9px;height:9px;border-radius:2px;background:'+(CATCOL[x.c]||'#94a3b8')+';flex-shrink:0"></span><span class="nm">'+x.item+' <span class="mut" style="font-size:11px;font-weight:500">'+x.c+'</span></span>'+
    '<span class="mut" style="font-size:11.5px">'+fmt(x.prev)+' → '+fmt(x.cur)+'</span><span class="delta '+(x.d>=0?'up':'dn')+'">'+(x.d>=0?'+':'')+fmt(x.d)+'</span> '+yoyChip(x.cur,x.prev)+'</div>';
  return '<div id="s-growth"></div><div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:18px">'+
    '<div class="card" style="margin:0"><div class="sec">🚀 성장 기여 품목 <span class="hint">1H26 vs 1H25</span></div>'+(grow.map(row).join('')||'<div class="mut" style="padding:14px">데이터 없음</div>')+'</div>'+
    '<div class="card" style="margin:0"><div class="sec">📉 감소 품목</div>'+(drop.map(row).join('')||'<div class="mut" style="padding:14px">없음</div>')+'</div></div>';
}

// ── 주요 내역 ──
function secNote(){
  const notes=(SP.notes||[]);
  const h=notes.map(n=>{ if(n[0]==='■') return '<div class="note h">'+n.replace(/^■\s*/,'')+'</div>'; if(/^\d\./.test(n)) return '<div class="note h" style="color:#3f5e7a">'+n+'</div>'; if(n[0]==='·') return '<div class="note b">'+n.replace(/^·\s*/,'')+'</div>'; return '<div class="note">'+n+'</div>'; }).join('');
  return '<div id="s-note"></div><div class="card"><div class="sec">📝 주요 내역 (1H26 분석)</div>'+(h||'<div class="mut">내역 없음</div>')+'</div>';
}

// ── 드릴다운 모달 (숫자/행 클릭) ──
let modalChart=null;
function closeModal(){ document.getElementById('modal').classList.remove('open'); if(modalChart){try{modalChart.destroy()}catch(e){}modalChart=null;} }
function openDetail(cat,item){
  const u=unit, uLab=u==='amount'?'백만원':'대';
  const name = item==='소계'?(cat+' 소계') : (/소계$/.test(item)? item : item);
  const rAll=findRow(u,'전체',cat,item)||{q25:[0,0,0,0],q26:[0,0],t25:0,t26:0};
  const rDom=findRow(u,'국내',cat,item)||{q25:[0,0,0,0],q26:[0,0],t25:0,t26:0};
  const rInt=findRow(u,'해외',cat,item)||{q25:[0,0,0,0],q26:[0,0],t25:0,t26:0};
  const gAll=grand(u,'전체'), catRow=findRow(u,'전체',cat,'소계')||gAll;
  const cur1H=curv(rAll), prev1H=h1(rAll), yoy=prev1H>0?((cur1H/prev1H-1)*100):0;
  const shareCat=pct(cur1H,curv(catRow)), shareTot=pct(cur1H,curv(gAll)), ovShare=pct(curv(rInt),cur1H);
  // 다른 단위(금액↔수량) 1H26 보조표시
  const altU=u==='amount'?'qty':'amount', rAlt=findRow(altU,'전체',cat,item);
  const mk=[
    {l:'1H26',v:fmt(cur1H)+(u==='amount'?'':'대'),s:'<span class="mut">'+uLab+'</span>'},
    {l:'YoY (vs 1H25)',v:(yoy>=0?'+':'')+yoy.toFixed(0)+'%',s:'<span class="'+(yoy>=0?'up':'dn')+'">'+fmt(prev1H)+' → '+fmt(cur1H)+'</span>'},
    {l:'카테고리 내 비중',v:shareCat.toFixed(1)+'%',s:'<span class="mut">'+cat+'</span>'},
    {l:'전사 비중',v:shareTot.toFixed(1)+'%',s:'<span class="mut">1H26 전체</span>'},
    {l:'해외 비중',v:ovShare.toFixed(1)+'%',s:'<span class="mut">국내 '+(100-ovShare).toFixed(1)+'%</span>'},
  ];
  if(rAlt) mk.push({l:'1H26 '+(altU==='amount'?'금액':'수량'),v:fmt(curv(rAlt))+(altU==='amount'?' 백만원':'대'),s:'<span class="mut">참고</span>'});
  const trow=(label,r)=>{ let t=''; COLS.forEach(c=>t+='<td>'+fmt(cv(r,c))+'</td>'); return '<tr><td class="l">'+label+'</td>'+t+'</tr>'; };
  const body=
    '<div class="mkpis">'+mk.map(x=>'<div class="mkpi"><div class="l">'+x.l+'</div><div class="v">'+x.v+'</div><div class="s">'+x.s+'</div></div>').join('')+'</div>'+
    '<div style="height:230px;margin-bottom:8px"><canvas id="mch"></canvas></div>'+
    '<div style="overflow-x:auto"><table class="dt"><thead><tr><th class="l">구분</th>'+COLS.map(c=>'<th>'+(c.k==='t25'?'25합':c.k==='t26'?'26합':(c.grp.slice(2,4)+c.lab))+'</th>').join('')+'</tr></thead><tbody>'+
      trow('전체',rAll)+trow('국내',rDom)+trow('해외',rInt)+'</tbody></table>'+
      '<div class="hint" style="margin-top:8px">단위 '+uLab+' · 상단 토글(금액/수량)에 연동</div></div>';
  document.getElementById('m-title').innerHTML=name+' <span class="mut" style="font-size:12px;font-weight:500">'+cat+'</span>';
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('modal').classList.add('open');
  // 미니 추이 차트 (전체/국내/해외)
  const ctx=document.getElementById('mch');
  const sQ=r=>[cv(r,COLS[0]),cv(r,COLS[1]),cv(r,COLS[2]),cv(r,COLS[3]),cv(r,COLS[5]),cv(r,COLS[6])];
  modalChart=new Chart(ctx,{type:'line',data:{labels:QL,datasets:[
    {label:'전체',data:sQ(rAll),borderColor:'#0f172a',backgroundColor:'#0f172a',borderWidth:2.5,tension:.3,pointRadius:3,fill:false},
    {label:'국내',data:sQ(rDom),borderColor:'#0891b2',backgroundColor:'#0891b2',borderWidth:2,tension:.3,pointRadius:2,fill:false},
    {label:'해외',data:sQ(rInt),borderColor:'#a8895e',backgroundColor:'#a8895e',borderWidth:2,tension:.3,pointRadius:2,fill:false},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11},usePointStyle:true}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.y)}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#94a3b8'}},y:{grid:{color:'#f1f3f5'},ticks:{font:{size:10},color:'#94a3b8'}}}}});
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

boot();
</script>
</body>
