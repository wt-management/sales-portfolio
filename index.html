<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wontech</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f6f7f9;--card:#fff;--line:#e8ebf0;--line2:#f1f3f5;--ink:#0f172a;--body:#475569;--muted:#94a3b8;--brand:#3f5e7a;--ok:#15803d;--bad:#b91c1c;--sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--body);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.1px;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}
#load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f6f7f9;color:#64748b;font-size:14px;z-index:50}
#app{display:none}
/* 사이드바 (통일 셸) */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:236px;background:#0f172a;color:#94a3b8;display:flex;flex-direction:column;z-index:20}
.brand{padding:20px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.brand .lg{width:32px;height:32px;border-radius:9px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:17px}
.brand b{color:#fff;font-size:14px}.brand small{display:block;color:#64748b;font-size:10.5px}
.nav{flex:1;padding:14px 12px;overflow:auto}
.nav .grp{font-size:10.5px;font-weight:700;color:#475569;letter-spacing:.08em;padding:6px 12px 8px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;color:#cbd5e1;font-weight:500;margin-bottom:2px;cursor:pointer;text-decoration:none}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}.nav a.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
.nav .ico{width:18px;text-align:center}
.acct{margin:8px 12px 4px;background:#1e293b;border:1px solid #334155;border-radius:11px;padding:10px 11px}
.acct .row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.acct .av{width:30px;height:30px;border-radius:50%;background:#ff4500;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:13px}
.acct .nm{font-size:12px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct .em{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct .btns{display:flex;gap:5px}
.acct .btns button{flex:1;background:rgba(255,255,255,.06);border:1px solid #334155;border-radius:7px;padding:6px 0;color:#94a3b8;font-size:11px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
.acct .btns button:hover{background:rgba(255,255,255,.12);color:#fff}
.switch-wrap{padding:6px 12px 4px;position:relative}
.switch-btn{width:100%;background:rgba(255,255,255,.05);border:1px solid #334155;border-radius:9px;padding:9px 11px;color:#94a3b8;font-size:12px;display:flex;align-items:center;gap:7px}
.switch-btn:hover{background:rgba(255,255,255,.1)}
.switch-dd{display:none;position:absolute;bottom:106%;left:12px;right:12px;background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden;box-shadow:0 -10px 30px rgba(0,0,0,.5);z-index:30;padding:6px}
.switch-dd.open{display:block}
.sw-item{margin-top:2px;border-radius:7px;padding:8px 11px;display:flex;align-items:center;gap:8px;color:#94a3b8;font-size:12px;cursor:pointer}
.sw-item:hover{background:rgba(255,255,255,.1)}.sw-item.cur{color:#fff;font-weight:700;background:rgba(63,94,122,.4)}
.sw-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:18px;color:#fff;border-radius:5px;font-size:10px;font-weight:700;padding:0 5px}
/* 메인 */
#main{margin-left:236px;min-height:100vh}
.topbar{position:sticky;top:0;z-index:15;background:rgba(246,247,249,.9);backdrop-filter:blur(8px);padding:18px 30px 14px;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.topbar h2{font-size:20px;font-weight:800;color:var(--ink)}
.topbar .desc{color:var(--muted);font-size:12.5px;margin-top:3px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff;box-shadow:var(--sh)}
.seg button{border:0;background:#fff;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:#0f172a;color:#fff}
.wrap{padding:22px 30px 50px}
.sec{font-size:15px;font-weight:700;color:var(--ink);margin:6px 0 14px;display:flex;align-items:center;gap:8px}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
.kpi .l{font-size:12px;color:var(--muted);font-weight:500}
.kpi .v{font-size:25px;font-weight:800;color:var(--ink);margin-top:7px;line-height:1}
.kpi .s{font-size:11.5px;margin-top:6px;font-weight:600}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--sh)}
.up{color:var(--ok)}.dn{color:var(--bad)}.mut{color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:right;padding:9px 12px;border-bottom:1px solid var(--line2)}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;background:#fafbfc}
td.l,th.l{text-align:left}
tr.cat td{background:#f5f7fa;font-weight:700;color:var(--ink);cursor:pointer}
tr.cat td .ar{transition:transform .15s;display:inline-block;color:#94a3b8}
tr.cat.open td .ar{transform:rotate(90deg)}
tr.prod td{color:var(--body)}tr.prod td.l{padding-left:30px}
.bar{height:7px;background:#eef1f7;border-radius:6px;overflow:hidden;min-width:70px;display:inline-block;width:100%;vertical-align:middle}
.bar>i{display:block;height:100%;background:var(--brand);border-radius:6px}
.note{font-size:13px;color:var(--body);padding:7px 0;border-bottom:1px dashed var(--line);line-height:1.5}
.note.h{font-weight:700;color:var(--ink);border:0;padding-top:14px}
.note.b{padding-left:14px;position:relative}.note.b:before{content:'·';position:absolute;left:2px;color:var(--brand)}
.mv{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.mv .nm{flex:1;font-weight:600;color:var(--ink);font-size:13px}
.mv .delta{font-weight:700;font-size:13px}
/* 로그인(폴백, 보통 중앙 로그인으로 redirect) */
#login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e2140);z-index:60}
.lc{background:#fff;border-radius:18px;padding:40px 34px;width:350px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.lc h1{font-size:18px;text-align:center;color:#0f172a}.lc .sub{text-align:center;color:#94a3b8;font-size:13px;margin:4px 0 22px}
.lc input{width:100%;padding:12px 14px;border:1px solid #e8ebf0;border-radius:10px;margin-bottom:11px}
.lc button{width:100%;padding:12px;border:0;border-radius:10px;background:#3f5e7a;color:#fff;font-weight:700}
#login-err{color:#b91c1c;font-size:12.5px;text-align:center;margin-top:10px;display:none}
@media(max-width:780px){#sidebar{width:60px}.brand b,.brand small,.nav .grp,.nav a span.lbl,.acct,.switch-btn span{display:none}#main{margin-left:60px}.topbar,.wrap{padding-left:16px;padding-right:16px}.nav a{justify-content:center}}
</style>
</head>
<body>
<div id="load"><i class="bi bi-arrow-repeat" style="margin-right:8px"></i>불러오는 중...</div>

<div id="login"><div class="lc"><h1>📊 Sales Portfolio</h1><div class="sub">글로벌영업실</div>
  <input id="login-id" type="email" placeholder="이메일"><input id="login-pw" type="password" placeholder="비밀번호">
  <button onclick="doLogin()">로그인</button><div id="login-err">이메일 또는 비밀번호가 올바르지 않습니다.</div></div></div>

<div id="app">
  <aside id="sidebar">
    <div class="brand"><div class="lg">📊</div><div><b>Sales Portfolio</b><small>글로벌영업실</small></div></div>
    <nav class="nav">
      <div class="grp">분석</div>
      <a class="active" onclick="goSec('s-kpi')"><span class="ico">📈</span><span class="lbl">경영 요약</span></a>
      <a onclick="goSec('s-mix')"><span class="ico">🧩</span><span class="lbl">포트폴리오 믹스</span></a>
      <a onclick="goSec('s-prod')"><span class="ico">📋</span><span class="lbl">품목별 상세</span></a>
      <a onclick="goSec('s-growth')"><span class="ico">🚀</span><span class="lbl">성장 분석</span></a>
      <a onclick="goSec('s-note')"><span class="ico">📝</span><span class="lbl">주요 내역</span></a>
    </nav>
    <div class="acct"><div class="row"><div class="av" id="uavatar">P</div><div style="flex:1;min-width:0"><div class="nm" id="uname-nm">-</div><div class="em" id="uname">-</div></div></div>
      <div class="btns"><button onclick="changePw()"><i class="bi bi-key"></i> 비밀번호</button><button onclick="doLogout()"><i class="bi bi-box-arrow-right"></i> 로그아웃</button></div></div>
    <div class="switch-wrap"><button class="switch-btn" onclick="document.getElementById('swdd').classList.toggle('open')"><i class="bi bi-grid-3x3-gap"></i><span style="flex:1;text-align:left;font-weight:600">사이트 이동</span><i class="bi bi-chevron-up" style="font-size:10px"></i></button>
      <div class="switch-dd" id="swdd">
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/total.html')"><span class="sw-badge" style="background:#4f46e5">종합</span><span style="flex:1">전사 종합 경영현황</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/')"><span class="sw-badge" style="background:#0891b2">KR</span><span style="flex:1">한국 영업</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/intl.html')"><span class="sw-badge" style="background:#0d9488">INT</span><span style="flex:1">해외 영업</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wtj-management/')"><span class="sw-badge" style="background:#f59e0b">JP</span><span style="flex:1">일본법인 관리</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wt-consumables/')"><span class="sw-badge" style="background:#16a34a">일보</span><span style="flex:1">일일매출보고</span></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/pm-planner/')"><span class="sw-badge" style="background:#8b5cf6">기획</span><span style="flex:1">상품기획 PM</span></div>
        <div class="sw-item cur"><span class="sw-badge" style="background:#3f5e7a">PF</span><span style="flex:1">Sales Portfolio</span><i class="bi bi-check2"></i></div>
        <div class="sw-item" onclick="goSite('https://wt-management.github.io/wontech/#app=admin')"><span class="sw-badge" style="background:#6b7280">ADM</span><span style="flex:1">관리자 페이지</span></div>
      </div></div>
  </aside>
  <main id="main">
    <div class="topbar"><div><h2>글로벌영업 Sales Portfolio</h2><div class="desc" id="asof">제품 포트폴리오·믹스 분석</div></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="seg" id="seg-unit"><button data-v="amount" class="on" onclick="setUnit('amount')">금액</button><button data-v="qty" onclick="setUnit('qty')">수량</button></div>
        <div class="seg" id="seg-scope"><button data-v="전체" class="on" onclick="setScope('전체')">전체</button><button data-v="국내" onclick="setScope('국내')">국내</button><button data-v="해외" onclick="setScope('해외')">해외</button></div>
      </div></div>
    <div class="wrap" id="view"></div>
  </main>
</div>

<script>
const SB_URL='https://mhfacbsittfdkknwybhc.supabase.co', SB_KEY='sb_publishable_aPMOOWAlyJlMcP1ZM_gpPA_jlrcvCRd';
const _sb=supabase.createClient(SB_URL,SB_KEY);
const CENTRAL='https://wt-management.github.io/wontech/';
let SP=null, ME='', unit='amount', scope='전체';
const QL=['25 1Q','25 2Q','25 3Q','25 4Q','26 1Q','26 2Q'];
const CATS=['RF/HIFU','Laser','Surgical','소모품'];
const CATCOL={'RF/HIFU':'#3f5e7a','Laser':'#5e8a73','Surgical':'#a8895e','소모품':'#8a7a9e'};

// ── 부트/로그인 (통일: 무세션→중앙 로그인) ──
async function boot(){
  const {data}=await _sb.auth.getSession();
  if(data&&data.session){ await enter(data.session.user); }
  else if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){ document.getElementById('load').textContent='로컬 개발 모드 (세션 없음)'; }
  else { location.href=CENTRAL; }
}
async function doLogin(){const e=(document.getElementById('login-id').value||'').trim(),p=(document.getElementById('login-pw').value||'').trim();const err=document.getElementById('login-err');err.style.display='none';const {data,error}=await _sb.auth.signInWithPassword({email:e,password:p});if(error){err.style.display='block';return;}await enter(data.user);}
async function doLogout(){await _sb.auth.signOut();Object.keys(localStorage).filter(k=>k.startsWith('sb-')).forEach(k=>localStorage.removeItem(k));location.href=CENTRAL;}
async function changePw(){const np=prompt('새 비밀번호 (6자 이상)');if(np===null)return;if((np||'').length<6){alert('6자 이상이어야 합니다.');return;}if(prompt('확인을 위해 다시 입력하세요')!==np){alert('일치하지 않습니다.');return;}const r=await _sb.auth.updateUser({password:np});if(r.error){alert('변경 실패: '+r.error.message);return;}alert('비밀번호가 변경되었습니다.');}
async function goSite(url){try{const {data:{session:s}}=await _sb.auth.getSession();if(s&&url.indexOf('#')<0)url+='#at='+encodeURIComponent(s.access_token)+'&rt='+encodeURIComponent(s.refresh_token);}catch(e){}location.href=url;}
document.addEventListener('click',e=>{const w=document.querySelector('.switch-wrap');if(w&&!w.contains(e.target))document.getElementById('swdd').classList.remove('open');});
async function enter(user){
  ME=user.email||''; document.getElementById('uname').textContent=ME; document.getElementById('uname-nm').textContent=(ME.split('@')[0]||'사용자'); document.getElementById('uavatar').textContent=(ME[0]||'P').toUpperCase();
  const {data,error}=await _sb.from('cons_cache').select('data').eq('key','sales_portfolio').single();
  if(error||!data){ document.getElementById('load').innerHTML='데이터를 불러오지 못했습니다. ('+(error&&error.message||'없음')+')'; return; }
  SP=data.data; document.getElementById('asof').textContent='제품 포트폴리오·믹스 분석 · 기준 '+(SP.asOf||'')+' · 단위 '+(SP.unit||'백만원');
  document.getElementById('load').style.display='none'; document.getElementById('app').style.display='block';
  render();
}

// ── 유틸 ──
function rows(){ return (SP[unit]||{})[scope]||[]; }
function findRow(arr,cat,item){ return arr.find(x=>x.cat===cat&&x.item===item); }
function grand(u,s){ return ((SP[u]||{})[s]||[]).find(x=>x.item==='총합계')||{q25:[0,0,0,0],t25:0,q26:[0,0],t26:0}; }
function catRow(cat){ return findRow(rows(),cat,'소계')||{q25:[0,0,0,0],t25:0,q26:[0,0],t26:0}; }
function products(cat){ return rows().filter(x=>x.cat===cat && !['소계','RF 소계','HIFU 소계'].includes(x.item)); }
function series(r){ return [r.q25[0],r.q25[1],r.q25[2],r.q25[3],r.q26[0],r.q26[1]]; }
function h1(r){ return (r.q25[0]||0)+(r.q25[1]||0); }     // 1H25
function h2(r){ return (r.q25[2]||0)+(r.q25[3]||0); }     // 2H25
function cur(r){ return r.t26||0; }                       // 1H26
function fmt(v){ if(unit==='qty') return Math.round(v).toLocaleString()+'대'; return (v/100).toFixed(1)+'억'; }
function fmtU(v,u){ if(u==='qty') return Math.round(v).toLocaleString()+'대'; return (v/100).toFixed(1)+'억'; }
function pct(n,d){ return d>0?(n/d*100):0; }
function yoyChip(n,d){ if(!d) return '<span class="mut">–</span>'; const g=(n/d-1)*100; return '<span class="'+(g>=0?'up':'dn')+'">'+(g>=0?'+':'')+g.toFixed(0)+'%</span>'; }
function setUnit(u){unit=u;document.querySelectorAll('#seg-unit button').forEach(b=>b.classList.toggle('on',b.dataset.v===u));render();}
function setScope(s){scope=s;document.querySelectorAll('#seg-scope button').forEach(b=>b.classList.toggle('on',b.dataset.v===s));render();}
function goSec(id){document.getElementById(id).scrollIntoView({behavior:'smooth',block:'start'});}

let charts=[];
function render(){
  charts.forEach(c=>{try{c.destroy()}catch(e){}}); charts=[];
  const v=document.getElementById('view');
  v.innerHTML=secKpi()+secMix()+secProd()+secGrowth()+secNote();
  drawMix(); drawDonut();
}

// ── 경영 요약 ──
function secKpi(){
  const gA=grand('amount','전체'), gAk=grand('amount','국내'), gAo=grand('amount','해외');
  const gQ=grand('qty','전체');
  const cur1H=gA.t26, prev1H=h1(gA), fy25=gA.t25;
  const yoyA=prev1H>0?((cur1H/prev1H-1)*100):0;
  const qCur=gQ.t26, qPrev=h1(gQ), yoyQ=qPrev>0?((qCur/qPrev-1)*100):0;
  const ovShare=pct(gAo.t26,gA.t26);
  const k=[
    {l:'1H26 매출 (반기 누적)',v:(cur1H/100).toFixed(0)+'억',s:'<span class="'+(yoyA>=0?'up':'dn')+'">'+(yoyA>=0?'▲':'▼')+Math.abs(yoyA).toFixed(1)+'%</span> <span class="mut">vs 1H25 '+(prev1H/100).toFixed(0)+'억</span>'},
    {l:'1H26 월평균 매출',v:(cur1H/6/100).toFixed(1)+'억',s:'<span class="mut">반기 6개월 기준</span>'},
    {l:'1H26 수량',v:Math.round(qCur).toLocaleString()+'대',s:'<span class="'+(yoyQ>=0?'up':'dn')+'">'+(yoyQ>=0?'▲':'▼')+Math.abs(yoyQ).toFixed(1)+'%</span> <span class="mut">vs 1H25</span>'},
    {l:'해외 비중 (금액)',v:ovShare.toFixed(1)+'%',s:'<span class="mut">국내 '+(100-ovShare).toFixed(1)+'%</span>'},
    {l:'2025년 연 매출',v:(fy25/100).toFixed(0)+'억',s:'<span class="mut">전년 실적 (연간)</span>'},
  ];
  return '<div id="s-kpi"></div><div class="grid kpis">'+k.map(x=>'<div class="kpi"><div class="l">'+x.l+'</div><div class="v">'+x.v+'</div><div class="s">'+x.s+'</div></div>').join('')+'</div>';
}

// ── 포트폴리오 믹스 ──
function secMix(){
  return '<div id="s-mix"></div><div class="grid" style="grid-template-columns:1.6fr 1fr;margin-bottom:18px">'+
   '<div class="card"><div class="sec">🧩 카테고리 믹스 추이 <span class="mut" style="font-size:12px;font-weight:500">분기별 비중</span></div><div style="height:300px"><canvas id="mixc"></canvas></div></div>'+
   '<div class="card"><div class="sec">🍩 1H26 구성</div><div style="height:240px"><canvas id="donut"></canvas></div><div id="donleg" style="margin-top:12px"></div></div></div>';
}
function drawMix(){
  const tot=series(grand(unit,scope));
  const ds=CATS.map(c=>{const sv=series(catRow(c)); return {label:c,data:sv.map((v,i)=>tot[i]>0?+(v/tot[i]*100).toFixed(1):0),backgroundColor:CATCOL[c],borderWidth:0,stack:'s'};});
  const ctx=document.getElementById('mixc'); if(!ctx)return;
  charts.push(new Chart(ctx,{type:'bar',data:{labels:QL,datasets:ds},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11},color:'#475569'}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},
    scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}},y:{stacked:true,max:100,grid:{color:'#f1f3f5'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+'%'}}}}}));
}
function drawDonut(){
  const ctx=document.getElementById('donut'); if(!ctx)return;
  const vals=CATS.map(c=>cur(catRow(c))); const tot=vals.reduce((a,b)=>a+b,0)||1;
  charts.push(new Chart(ctx,{type:'doughnut',data:{labels:CATS,datasets:[{data:vals,backgroundColor:CATS.map(c=>CATCOL[c]),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+': '+fmt(c.parsed)+' ('+(c.parsed/tot*100).toFixed(1)+'%)'}}}}}));
  document.getElementById('donleg').innerHTML=CATS.map((c,i)=>'<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0"><span style="width:10px;height:10px;border-radius:3px;background:'+CATCOL[c]+'"></span><span style="flex:1">'+c+'</span><b style="color:#0f172a">'+(vals[i]/tot*100).toFixed(1)+'%</b><span class="mut" style="width:62px;text-align:right">'+fmt(vals[i])+'</span></div>').join('');
}

// ── 품목별 상세 ──
let openCat={};
function toggleCat(c){openCat[c]=!openCat[c];render();}
function secProd(){
  const g=grand(unit,scope);
  let rowsH='';
  CATS.forEach(c=>{
    const cr=catRow.call({},c);
    rowsH+='<tr class="cat '+(openCat[c]?'open':'')+'" onclick="toggleCat(\''+c.replace(/'/g,"\\'")+'\')"><td class="l"><span class="ar">▶</span> '+c+'</td>'+
      '<td>'+fmt(cr.t25)+'</td><td>'+fmt(h1(cr))+'</td><td>'+fmt(cur(cr))+'</td><td>'+yoyChip(cur(cr),h1(cr))+'</td>'+
      '<td>'+pct(cur(cr),cur(g)).toFixed(1)+'%</td><td style="width:90px"><span class="bar"><i style="width:'+pct(cur(cr),cur(g)).toFixed(0)+'%"></i></span></td></tr>';
    if(openCat[c]) products(c).sort((a,b)=>cur(b)-cur(a)).forEach(p=>{
      rowsH+='<tr class="prod"><td class="l">'+p.item+'</td><td>'+fmt(p.t25)+'</td><td>'+fmt(h1(p))+'</td><td>'+fmt(cur(p))+'</td><td>'+yoyChip(cur(p),h1(p))+'</td>'+
        '<td>'+pct(cur(p),cur(g)).toFixed(1)+'%</td><td><span class="bar"><i style="width:'+pct(cur(p),cur(cr)).toFixed(0)+'%;background:'+CATCOL[c]+'"></i></span></td></tr>';
    });
  });
  return '<div id="s-prod"></div><div class="card" style="padding:0;overflow:auto;margin-bottom:18px"><div class="sec" style="padding:18px 20px 4px">📋 품목별 상세 <span class="mut" style="font-size:12px;font-weight:500">행을 누르면 품목 펼침</span></div>'+
    '<table><thead><tr><th class="l">카테고리 / 품목</th><th>2025 연</th><th>1H25</th><th>1H26</th><th>YoY</th><th>1H26 비중</th><th>구성</th></tr></thead><tbody>'+rowsH+'</tbody></table></div>';
}

// ── 성장 분석 ──
function secGrowth(){
  const list=[];
  CATS.forEach(c=>products(c).forEach(p=>{const d=cur(p)-h1(p); list.push({c,item:p.item,d,cur:cur(p),prev:h1(p)});}));
  const grow=list.filter(x=>x.d>0).sort((a,b)=>b.d-a.d).slice(0,7);
  const drop=list.filter(x=>x.d<0).sort((a,b)=>a.d-b.d).slice(0,4);
  const maxD=Math.max(1,...grow.map(x=>x.d));
  const row=x=>'<div class="mv"><span style="width:9px;height:9px;border-radius:2px;background:'+CATCOL[x.c]+';flex-shrink:0"></span><span class="nm">'+x.item+' <span class="mut" style="font-size:11px;font-weight:500">'+x.c+'</span></span>'+
    '<span class="mut" style="font-size:11.5px">'+fmt(x.prev)+' → '+fmt(x.cur)+'</span><span class="delta '+(x.d>=0?'up':'dn')+'">'+(x.d>=0?'+':'')+fmt(x.d)+'</span> '+yoyChip(x.cur,x.prev)+'</div>';
  return '<div id="s-growth"></div><div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:18px">'+
    '<div class="card"><div class="sec">🚀 성장 기여 품목 <span class="mut" style="font-size:12px;font-weight:500">1H26 vs 1H25</span></div>'+(grow.map(row).join('')||'<div class="mut" style="padding:14px">데이터 없음</div>')+'</div>'+
    '<div class="card"><div class="sec">📉 감소 품목</div>'+(drop.map(row).join('')||'<div class="mut" style="padding:14px">없음</div>')+'</div></div>';
}

// ── 주요 내역 ──
function secNote(){
  const notes=(SP.notes||[]);
  const h=notes.map(n=>{ if(n[0]==='■') return '<div class="note h">'+n.replace(/^■\s*/,'')+'</div>'; if(/^\d\./.test(n)) return '<div class="note h" style="color:#3f5e7a">'+n+'</div>'; if(n[0]==='·') return '<div class="note b">'+n.replace(/^·\s*/,'')+'</div>'; return '<div class="note">'+n+'</div>'; }).join('');
  return '<div id="s-note"></div><div class="card"><div class="sec">📝 주요 내역 (1H26 분석)</div>'+(h||'<div class="mut">내역 없음</div>')+'</div>';
}

boot();
</script>
</body>
</html>
